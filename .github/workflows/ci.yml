name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  checks: write
  actions: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build and verify
        run: ./gradlew build --no-daemon

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/test-results/test/TEST-*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Test Summary
        if: always()
        id: tests
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Tests (JUnit)
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
          use-actions-summary: true

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 spring-boot-template CI finished

            *Status:* ${{ job.status }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* ${{ github.sha }}
            *Author:* ${{ github.actor }}

            🧪 *Tests*
            - Total: ${{ steps.tests.outputs.total }}
            - Passed: ${{ steps.tests.outputs.passed }}
            - Failed: ${{ steps.tests.outputs.failed }}
            - Skipped: ${{ steps.tests.outputs.skipped }}
          format: markdown

      - name: Post Test Summary as PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: "Test Results"
          message: |
            ## 🧪 Test Results

            - Total: ${{ steps.tests.outputs.total }}
            - Passed: ${{ steps.tests.outputs.passed }}
            - Failed: ${{ steps.tests.outputs.failed }}
            - Skipped: ${{ steps.tests.outputs.skipped }}
