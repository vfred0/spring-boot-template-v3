name: spring-boot-template

services:
  spring-boot-template-keycloak-db:
    image: postgres:18-alpine
    container_name: postgres
    profiles: ["keycloak"]
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - spring-boot-template-keycloak-db-data:/var/lib/postgresql

  spring-boot-template-db:
    image: postgres:18-alpine
    container_name: spring-boot-template-db
    environment:
      POSTGRES_USER: spring-boot-template
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: spring-boot-template
    ports:
      - "5433:5432"
    volumes:
      - spring-boot-template-db-data:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    profiles: ["keycloak"]
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_ADMIN: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    depends_on:
      - spring-boot-template-keycloak-db
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/spring-boot-template HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"realm\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  spring-boot-template:
    container_name: spring-boot-template
    build:
      context: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      APP_SECURITY_MODE: ${APP_SECURITY_MODE:-KEYCLOAK_JWT}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration,classpath:db/devseed
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_AUTH_SERVER_URL: http://localhost:8080
      KEYCLOAK_OAUTH2_FRONTEND_CALLBACK_URL: http://localhost:4200/auth/callback
      SPRING_DATASOURCE_URL: jdbc:postgresql://spring-boot-template-db:5432/spring-boot-template
      SPRING_DATASOURCE_USERNAME: spring-boot-template
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
      KEYCLOAK_RESOURCE_CLIENT_ID: ${KEYCLOAK_RESOURCE_CLIENT_ID}
      KEYCLOAK_RESOURCE_CLIENT_SECRET: ${KEYCLOAK_RESOURCE_CLIENT_SECRET}
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - app-downloads:/app/data
      - ./logs:/app/logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      spring-boot-template-db:
        condition: service_started
      keycloak:
        condition: service_healthy
        required: false

volumes:
  spring-boot-template-db-data:
  spring-boot-template-keycloak-db-data:
  app-downloads:

networks:
  default:
    name: spring-boot-template
    driver: bridge
