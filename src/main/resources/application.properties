# ------------------------------------------------------------
# SERVER CONFIG
# ------------------------------------------------------------
server.port=8081
spring.application.name=spring-boot-template
spring.main.web-application-type=servlet
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Honor X-Forwarded-* from a trusted proxy so client IP / audit reflect the real caller
server.forward-headers-strategy=framework

# ------------------------------------------------------------
# DATASOURCE + JPA + FLYWAY CONFIG
# ------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# HikariCP connection pool
spring.datasource.hikari.pool-name=spring-boot-template-pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# QUARTZ SCHEDULER (persistent JDBC job store)
# ------------------------------------------------------------
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.auto-startup=false
spring.quartz.overwrite-existing-jobs=false
spring.quartz.wait-for-jobs-to-complete-on-shutdown=true
spring.quartz.properties.org.quartz.scheduler.instanceName=spring-boot-template-scheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.org.quartz.jobStore.class=org.springframework.scheduling.quartz.LocalDataSourceJobStore
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.jobStore.useProperties=false
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000

# ------------------------------------------------------------
# KEYCLOAK CONFIG
# ------------------------------------------------------------
keycloak.realm=spring-boot-template
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
keycloak.resource-client-id=${KEYCLOAK_RESOURCE_CLIENT_ID}
keycloak.resource-client-secret=${KEYCLOAK_RESOURCE_CLIENT_SECRET}
keycloak.connect-timeout=${KEYCLOAK_CONNECT_TIMEOUT:2s}
keycloak.read-timeout=${KEYCLOAK_READ_TIMEOUT:2s}

# Token & revoke endpoints used by KeycloakAuthService
keycloak.token-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
keycloak.logout-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/logout
keycloak.introspection-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token/introspect
keycloak.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
keycloak.users-url=${keycloak.auth-server-url}/admin/realms/${keycloak.realm}/users

# ------------------------------------------------------------
# SECURITY MODE (authentication strategy selector)
# ------------------------------------------------------------
app.security.mode=${APP_SECURITY_MODE:KEYCLOAK_OPAQUE}
app.security.api-key.header=${APP_SECURITY_API_KEY_HEADER:X-API-Key}
app.security.api-key.last-used-throttle=${APP_SECURITY_API_KEY_LAST_USED_THROTTLE:1m}

# ------------------------------------------------------------
# RESOURCE SERVER (OPAQUE TOKEN / INTROSPECTION)
# ------------------------------------------------------------
spring.security.oauth2.resourceserver.opaque-token.introspection-uri=${keycloak.introspection-url}
spring.security.oauth2.resourceserver.opaque-token.client-id=${keycloak.resource-client-id}
spring.security.oauth2.resourceserver.opaque-token.client-secret=${keycloak.resource-client-secret}
security.dpop.enabled=${SECURITY_DPOP_ENABLED:true}
security.dpop.max-proof-age=${SECURITY_DPOP_MAX_PROOF_AGE:5m}
security.dpop.clock-skew=${SECURITY_DPOP_CLOCK_SKEW:30s}
security.dpop.replay-cache-size=${SECURITY_DPOP_REPLAY_CACHE_SIZE:100000}

# ------------------------------------------------------------
# RATE LIMITING (custom Bucket4j filter)
# ------------------------------------------------------------

# --- Spring Cache ---
spring.cache.type=caffeine
spring.cache.cache-names[0]=filterConfigCache
spring.cache.cache-names[1]=rateLimitBuckets
spring.cache.cache-names[2]=loginBuckets
spring.cache.cache-names[3]=clientsBuckets
spring.cache.caffeine.spec=maximumSize=1000000,expireAfterAccess=3600s

# Rule 0: 5 login attempts per 60 seconds (keyed by client IP)
app.rate-limit.rules[0].id=login
app.rate-limit.rules[0].enabled=true
app.rate-limit.rules[0].order=0
app.rate-limit.rules[0].path-pattern=/api/auth/login
app.rate-limit.rules[0].methods[0]=POST
app.rate-limit.rules[0].key-strategy=IP
app.rate-limit.rules[0].cache-name=loginBuckets
app.rate-limit.rules[0].capacity=5
app.rate-limit.rules[0].window-seconds=60

# Rule 1: 20 /api/clients/** requests per 60 seconds for authenticated clientId spring-app
app.rate-limit.rules[1].id=clients
app.rate-limit.rules[1].enabled=true
app.rate-limit.rules[1].order=1
app.rate-limit.rules[1].path-pattern=/api/clients/**
app.rate-limit.rules[1].client-ids[0]=spring-app
app.rate-limit.rules[1].key-strategy=CLIENT_ID
app.rate-limit.rules[1].cache-name=clientsBuckets
app.rate-limit.rules[1].capacity=20
app.rate-limit.rules[1].window-seconds=60

# Client search
app.clients.search.max-results=${APP_CLIENTS_SEARCH_MAX_RESULTS:20}

